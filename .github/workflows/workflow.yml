name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Install required tools
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-reportgenerator-globaltool
      - name: Restore dependencies
        run: dotnet restore Calculator.sln
      - name: Start static code analysis
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONARQUBE_KEY }}" \
            /d:sonar.host.url="${{ secrets.SONARQUBE_URL }}" \
            /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}" \
            /d:sonar.coverageReportPaths="coverage-report/SonarQube.xml" \
            /d:sonar.qualitygate.wait=false \
            /d:sonar.qualitygate.timeout=300
      - name: Build
        run: dotnet build Calculator.sln --configuration Release --no-restore
      - name: Run tests
        run: |
          dotnet test Calculator.sln \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults
      - name: Generate coverage report for SonarQube
        run: |
          reportgenerator \
            -reports:TestResults/**/coverage.cobertura.xml \
            -targetdir:coverage-report \
            -reporttypes:SonarQube
      - name: Complete static code analysis
        run: |
          dotnet sonarscanner end \
            /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}"

  deploy-database:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef
      - name: Restore dependencies
        run: dotnet restore Calculator.sln
      - name: Generate SQL migration script
        run: |
          dotnet ef migrations script \
            --idempotent \
            --project DataAccess \
            --output migrations.sql
      - name: Upload migration script as artifact
        uses: actions/upload-artifact@v4
        with:
          name: migrations
          path: migrations.sql
      - name: Apply migrations to staging
        run: |
          dotnet ef database update \
            --project DataAccess \
            --configuration Release \
            --connection "${{ secrets.STAGING_CONNECTION_STRING }}"

  spike-test:
    runs-on: ubuntu-latest
    needs: deploy-database
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run spike test
        run: k6 run spike.js
        continue-on-error: true

  e2e-test:
    runs-on: ubuntu-latest
    needs: deploy-database
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install TestCafe
        run: npm install -g testcafe
      - name: Run TestCafe tests
        run: testcafe chrome:headless calculator.testcafe.js
        continue-on-error: true
